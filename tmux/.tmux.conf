# ============================================================
# Tmux Configuration — Productivity Setup
# ============================================================

# --- Prefix ---
# Remap prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General Settings ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g display-time 3000
set -g display-panes-time 3000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 0
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on

# --- Vi Mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- Pane Splitting (intuitive keys) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane Navigation (Alt + arrow, no prefix needed) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Pane Resizing (Prefix + Shift-arrow) ---
bind -r S-Left resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up resize-pane -U 3
bind -r S-Down resize-pane -D 3

# --- Window Navigation ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# --- Quick Actions ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind z resize-pane -Z              # Toggle zoom
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind K confirm-before -p "Kill session? (y/n)" kill-session

# --- Status Bar ---
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#1e1e2e] "
set -g status-right "#[fg=#585b70]  %H:%M  #[fg=#a6adc8] %b %d #[fg=#1e1e2e,bg=#a6e3a1,bold]  #H "

# --- Window Status ---
setw -g window-status-format "#[fg=#585b70] #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W "
setw -g window-status-separator ""

# --- Pane Borders ---
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# --- Message Style ---
set -g message-style "bg=#cba6f7,fg=#1e1e2e,bold"

# --- Activity Monitoring ---
setw -g monitor-activity on
set -g visual-activity off

# ============================================================
# Auto-start: 3-pane layout on new session
# ============================================================
# Main pane on top (wide), two smaller panes on the bottom
# Only runs when creating a brand-new session (not on reloads)

# Hook: when any new session is created, set up the 3-pane layout
set-hook -g session-created 'split-window -v -l 30% -c "#{pane_current_path}" ; split-window -h -c "#{pane_current_path}" ; select-pane -t 1'
